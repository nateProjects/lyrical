<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternating Indentation</title>
    <style>
        .alternating-indented {
            line-height: 1; /* Remove additional line spacing */
        }

        .alternating-indented div:nth-child(even) {
            margin-left: 20px; /* Indent even lines */
        }
    </style>
</head>
<body>
    <div class="alternating-indented">
        <div>first line</div>
        <div>second line</div>
        <div>third line</div>
        <div>fourth line</div>
    </div>
    <div class="alternating-indented">
        first line
        second line
        third line
        fourth line
    </div>
</body>
</html>
