<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternating Indentation</title>
    <style>
        .indented {
            margin-left: 20px; /* Indentation for every second line */
        }
    </style>
</head>
<body>
    <div id="content" class="alternating-indented"></div>

    <script>
        // Function to fetch the file from the server
        function fetchFile(filePath) {
            return fetch(filePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                });
        }

        // Function to process the file content and update the HTML
        function processContent(content) {
            const div = document.getElementById('content');
            const lines = content.split(/[\r\n]+/); // Split the content into lines

            // Clear the original content
            div.innerHTML = '';

            // Loop through each line and wrap it with a span
            lines.forEach((line, index) => {
                const span = document.createElement('span');
                span.textContent = line.trim();

                // Add indentation to every second line
                if (index % 2 !== 0) {
                    span.classList.add('indented');
                }

                // Append the span to the div
                div.appendChild(span);

                // Add a line break after each line except the last one
                if (index < lines.length - 1) {
                    div.appendChild(document.createElement('br'));
                }
            });
        }

        // Main function to execute fetch and process
        document.addEventListener("DOMContentLoaded", function() {
            const filePath = 'path/to/your/poem.md'; // Update with the actual path

            fetchFile(filePath)
                .then(content => processContent(content))
                .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
